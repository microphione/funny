<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Quest - 16-bit RPG</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Press Start 2P', monospace;
            color: #e0e0e0;
            overflow: hidden;
        }

        #game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        #top-bar {
            display: flex;
            justify-content: space-between;
            width: 640px;
            background: #16213e;
            border: 3px solid #0f3460;
            border-radius: 6px;
            padding: 8px 16px;
            font-size: 10px;
        }

        #top-bar .stat {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        #top-bar .stat-icon {
            font-size: 14px;
        }

        .hp-bar-container {
            width: 80px;
            height: 10px;
            background: #333;
            border: 1px solid #555;
            border-radius: 2px;
            overflow: hidden;
        }

        .hp-bar {
            height: 100%;
            background: #e74c3c;
            transition: width 0.3s;
        }

        .xp-bar {
            height: 100%;
            background: #3498db;
            transition: width 0.3s;
        }

        #game-container {
            position: relative;
            width: 640px;
            height: 480px;
            border: 3px solid #0f3460;
            border-radius: 6px;
            overflow: hidden;
            image-rendering: pixelated;
        }

        #game-canvas {
            width: 640px;
            height: 480px;
            image-rendering: pixelated;
            display: block;
        }

        #message-log {
            width: 640px;
            height: 80px;
            background: #16213e;
            border: 3px solid #0f3460;
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 9px;
            line-height: 1.8;
            overflow-y: auto;
            color: #aaa;
        }

        #message-log .msg-combat { color: #e74c3c; }
        #message-log .msg-loot { color: #f1c40f; }
        #message-log .msg-info { color: #3498db; }
        #message-log .msg-heal { color: #2ecc71; }
        #message-log .msg-shop { color: #e67e22; }

        #controls-hint {
            font-size: 8px;
            color: #555;
            text-align: center;
            margin-top: 4px;
        }

        /* Dialog / Shop overlay */
        #dialog-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.75);
            z-index: 10;
            justify-content: center;
            align-items: center;
        }

        #dialog-overlay.active {
            display: flex;
        }

        #dialog-box {
            background: #16213e;
            border: 3px solid #e67e22;
            border-radius: 8px;
            padding: 20px;
            max-width: 500px;
            width: 90%;
            max-height: 400px;
            overflow-y: auto;
        }

        #dialog-box h2 {
            font-size: 14px;
            color: #e67e22;
            margin-bottom: 16px;
            text-align: center;
        }

        .shop-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            margin: 4px 0;
            background: #1a1a2e;
            border-radius: 4px;
            font-size: 9px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: border-color 0.2s;
        }

        .shop-item:hover {
            border-color: #e67e22;
        }

        .shop-item.cannot-afford {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .shop-item .item-name { color: #fff; }
        .shop-item .item-price { color: #f1c40f; }
        .shop-item .item-desc { color: #888; font-size: 8px; }

        #dialog-close {
            display: block;
            margin: 16px auto 0;
            padding: 8px 24px;
            background: #e67e22;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            cursor: pointer;
        }

        #dialog-close:hover {
            background: #d35400;
        }

        /* Combat overlay */
        #combat-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 10;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #combat-overlay.active {
            display: flex;
        }

        #combat-box {
            background: #16213e;
            border: 3px solid #e74c3c;
            border-radius: 8px;
            padding: 20px;
            width: 500px;
            text-align: center;
        }

        #combat-box h2 {
            font-size: 14px;
            color: #e74c3c;
            margin-bottom: 12px;
        }

        #enemy-display {
            margin: 12px 0;
            font-size: 48px;
        }

        .enemy-hp-container {
            width: 200px;
            height: 14px;
            background: #333;
            border: 2px solid #555;
            border-radius: 3px;
            margin: 8px auto;
            overflow: hidden;
        }

        .enemy-hp-bar {
            height: 100%;
            background: #e74c3c;
            transition: width 0.3s;
        }

        #combat-actions {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 16px;
        }

        .combat-btn {
            padding: 10px 20px;
            font-family: 'Press Start 2P', monospace;
            font-size: 9px;
            border: 2px solid;
            border-radius: 4px;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .combat-btn:hover { transform: scale(1.05); }
        .combat-btn:active { transform: scale(0.95); }

        .btn-attack { background: #e74c3c; color: #fff; border-color: #c0392b; }
        .btn-skill { background: #9b59b6; color: #fff; border-color: #8e44ad; }
        .btn-potion { background: #2ecc71; color: #fff; border-color: #27ae60; }
        .btn-flee { background: #7f8c8d; color: #fff; border-color: #95a5a6; }

        #combat-log {
            margin-top: 12px;
            font-size: 9px;
            color: #aaa;
            max-height: 60px;
            overflow-y: auto;
        }

        /* Inventory overlay */
        #inventory-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.75);
            z-index: 10;
            justify-content: center;
            align-items: center;
        }

        #inventory-overlay.active {
            display: flex;
        }

        #inventory-box {
            background: #16213e;
            border: 3px solid #3498db;
            border-radius: 8px;
            padding: 20px;
            width: 500px;
            max-height: 400px;
            overflow-y: auto;
        }

        #inventory-box h2 {
            font-size: 14px;
            color: #3498db;
            margin-bottom: 16px;
            text-align: center;
        }

        .inv-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 8px;
            margin: 3px 0;
            background: #1a1a2e;
            border-radius: 4px;
            font-size: 9px;
        }

        .inv-item .use-btn {
            padding: 4px 12px;
            background: #3498db;
            color: #fff;
            border: none;
            border-radius: 3px;
            font-family: 'Press Start 2P', monospace;
            font-size: 8px;
            cursor: pointer;
        }

        .equipped { border: 1px solid #f1c40f; }

        /* Title screen */
        #title-screen {
            display: flex;
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #1a1a2e;
            z-index: 20;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #title-screen h1 {
            font-size: 28px;
            color: #e67e22;
            text-shadow: 3px 3px 0 #c0392b;
            margin-bottom: 8px;
        }

        #title-screen .subtitle {
            font-size: 10px;
            color: #888;
            margin-bottom: 40px;
        }

        .title-btn {
            padding: 12px 40px;
            margin: 6px;
            font-family: 'Press Start 2P', monospace;
            font-size: 11px;
            background: #16213e;
            color: #e0e0e0;
            border: 2px solid #0f3460;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .title-btn:hover {
            background: #0f3460;
            border-color: #e67e22;
            color: #e67e22;
        }

        /* Location label */
        #location-label {
            position: absolute;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            color: #fff;
            text-shadow: 1px 1px 2px #000;
            z-index: 5;
            pointer-events: none;
        }

        /* Damage flash */
        .damage-flash {
            animation: flash 0.15s ease-out;
        }
        @keyframes flash {
            0% { filter: brightness(3) saturate(0); }
            100% { filter: none; }
        }

        /* Level up effect */
        .level-up-text {
            position: absolute;
            font-size: 16px;
            color: #f1c40f;
            text-shadow: 2px 2px 0 #000;
            z-index: 15;
            animation: floatUp 2s ease-out forwards;
            pointer-events: none;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-60px); }
        }

        /* Mini-map */
        #minimap {
            position: absolute;
            top: 8px;
            right: 8px;
            border: 2px solid #0f3460;
            border-radius: 4px;
            z-index: 5;
            image-rendering: pixelated;
        }
    </style>
</head>
<body>
    <div id="game-wrapper">
        <div id="top-bar">
            <div class="stat">
                <span class="stat-icon">&#9876;</span>
                <span>LVL <span id="stat-level">1</span></span>
            </div>
            <div class="stat">
                <span class="stat-icon">&#10084;</span>
                <span>HP</span>
                <div class="hp-bar-container">
                    <div class="hp-bar" id="hp-bar" style="width:100%"></div>
                </div>
                <span id="stat-hp">50/50</span>
            </div>
            <div class="stat">
                <span class="stat-icon">&#9733;</span>
                <span>XP</span>
                <div class="hp-bar-container">
                    <div class="xp-bar" id="xp-bar" style="width:0%"></div>
                </div>
            </div>
            <div class="stat">
                <span class="stat-icon">&#9733;</span>
                <span id="stat-gold">0</span> Zł
            </div>
            <div class="stat">
                <span class="stat-icon">&#9876;</span>
                <span>ATK <span id="stat-atk">5</span></span>
            </div>
            <div class="stat">
                <span class="stat-icon">&#128737;</span>
                <span>DEF <span id="stat-def">2</span></span>
            </div>
        </div>

        <div id="game-container">
            <canvas id="game-canvas" width="640" height="480"></canvas>
            <canvas id="minimap" width="80" height="60"></canvas>
            <div id="location-label"></div>

            <div id="title-screen">
                <h1>PIXEL QUEST</h1>
                <div class="subtitle">~ 16-bitowa przygoda RPG ~</div>
                <button class="title-btn" id="btn-new-game">Nowa Gra</button>
                <button class="title-btn" id="btn-load-game">Wczytaj Grę</button>
            </div>

            <div id="dialog-overlay">
                <div id="dialog-box">
                    <h2 id="dialog-title">Sklep</h2>
                    <div id="dialog-content"></div>
                    <button id="dialog-close">Zamknij [ESC]</button>
                </div>
            </div>

            <div id="combat-overlay">
                <div id="combat-box">
                    <h2 id="combat-title">Walka!</h2>
                    <div id="enemy-display"></div>
                    <div id="enemy-name" style="font-size:11px;color:#fff;margin:4px 0;"></div>
                    <div class="enemy-hp-container">
                        <div class="enemy-hp-bar" id="enemy-hp-bar" style="width:100%"></div>
                    </div>
                    <div id="enemy-hp-text" style="font-size:9px;color:#aaa;margin:4px 0;"></div>
                    <div id="combat-actions">
                        <button class="combat-btn btn-attack" onclick="Game.combat.doAttack()">Atak [A]</button>
                        <button class="combat-btn btn-skill" onclick="Game.combat.doSkill()">Umiej. [S]</button>
                        <button class="combat-btn btn-potion" onclick="Game.combat.doPotion()">Mikstura [D]</button>
                        <button class="combat-btn btn-flee" onclick="Game.combat.doFlee()">Ucieczka [F]</button>
                    </div>
                    <div id="combat-log"></div>
                </div>
            </div>

            <div id="inventory-overlay">
                <div id="inventory-box">
                    <h2>Ekwipunek</h2>
                    <div id="inventory-content"></div>
                    <button id="dialog-close-inv" style="display:block;margin:16px auto 0;padding:8px 24px;background:#3498db;color:#fff;border:none;border-radius:4px;font-family:'Press Start 2P',monospace;font-size:10px;cursor:pointer;">Zamknij [ESC]</button>
                </div>
            </div>
        </div>

        <div id="message-log"></div>
        <div id="controls-hint">
            [WASD / Strzałki] Ruch &nbsp; [SPACJA] Interakcja &nbsp; [I] Ekwipunek &nbsp; [M] Mapa
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
